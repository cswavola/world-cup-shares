<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>WC26 Shares</title>

  <!-- iPhone home-screen / standalone app behaviour -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WC26 Shares" />
  <meta name="theme-color" content="#14442F" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="manifest" href="manifest.webmanifest" />

  <style>
    html, body { margin: 0; background: #F4F6F1; }
    #boot { font-family: -apple-system, sans-serif; color: #5C6B61; text-align: center; padding-top: 40vh; }
    /* minimal flex helpers the components rely on */
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .flex-wrap { flex-wrap: wrap; }
    .items-center { align-items: center; }
    .gap-1 { gap: 4px; } .gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; }
    .w-full { width: 100%; }
    .text-left { text-align: left; }
    button { border: none; background: none; cursor: pointer; font-family: inherit; }
  </style>

  <!-- React from CDN (loaded on your friends' phones). app.jsx is precompiled to
       app.js by the build step, so no in-browser compiler is shipped anymore. -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
  <div id="root"><div id="boot">Loading WC26 Shares…</div></div>

  <script>
    // Surface errors on the page (so we can debug without a console).
    function showError(msg) {
      var r = document.getElementById("root");
      if (r) r.innerHTML = '<div style="font-family:-apple-system,sans-serif;color:#C84B3C;' +
        'padding:24px;white-space:pre-wrap;font-size:14px;line-height:1.5">' +
        '⚠️ Problem loading the app:\n\n' + String(msg) + '</div>';
    }
    window.addEventListener("error", function (e) {
      showError((e.message || e.error) + (e.filename ? "\n\n" + e.filename + ":" + e.lineno : ""));
    });
    window.addEventListener("unhandledrejection", function (e) {
      showError("Network/promise error: " + (e.reason && e.reason.message ? e.reason.message : e.reason));
    });
    window.addEventListener("load", function () {
      var miss = [];
      if (!window.React) miss.push("React");
      if (!window.ReactDOM) miss.push("ReactDOM");
      if (miss.length) showError("These libraries didn't load (CDN blocked?): " + miss.join(", "));
      // If still on the boot message a few seconds later, app.js probably didn't load.
      setTimeout(function () {
        if (document.getElementById("boot"))
          showError("app.js didn't run. It's generated from app.jsx by the build step — run 'npm run build' and make sure app.js is committed at the repo root.");
      }, 4000);
    });
  </script>

  <!-- Built from app.jsx by esbuild (npm run build). Edit app.jsx, not app.js. -->
  <script src="app.js"></script>
</body>
</html>
